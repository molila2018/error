<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Error...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Courier New', Courier, monospace; /* ฟอนต์สไตล์คอมพิวเตอร์ */
            overflow: hidden;
            background-color: #0078D7; /* สีฟ้าแบบจอ Error Windows */
            color: white;
            transition: background-color 1s ease;
        }

        .font-lao {
            font-family: 'Prompt', sans-serif, 'Phetsarath OT';
        }

        /* หน้าจอดำตอนโหลด */
        #loading-screen {
            background-color: #111;
            font-family: 'Courier New', Courier, monospace;
        }

        /* หน้าจอสีชมพูตอนสำเร็จ */
        #success-screen {
            background-color: #fce7f3;
            background-image: radial-gradient(#f9a8d4 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        .cursor-blink {
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="h-screen w-full relative selection:bg-white selection:text-blue-600">

    <!-- 1. หน้าจอ Error ฟ้า (BSOD) -->
    <div id="error-screen" class="absolute inset-0 flex flex-col justify-center p-8 md:p-20 z-10">
        <h1 class="text-7xl md:text-9xl mb-8">:(</h1>
        <h2 class="text-2xl md:text-4xl font-bold mb-6 font-lao leading-relaxed">
            Your phone it error<br>
            The system is collecting error data. Your permission is required to restart the system.
        </h2>
        <p class="text-lg md:text-xl mb-8 opacity-90 font-lao">
            ລະບົບກຳລັງເກັບກຳຂໍ້ມູນຄວາມຜິດ. ຕ້ອງການການອະໄພຈາກທ່ານເພື່ອຣີສະຕາດລະບົບໃໝ່.<br>
            <span class="text-sm mt-4 block">Stop Code: SLEEP_TOO_DEEP</span>
        </p>

        <button id="repair-btn" class="font-lao bg-white/20 hover:bg-white/40 border-2 border-white text-white font-bold py-3 px-6 rounded transition-colors self-start text-lg flex items-center gap-2">
            <span>ກົດເພື່ອສ້ອມແປງລະບົບ</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
        </button>
    </div>

    <!-- 2. หน้าจอโหลด (Hacker Terminal) -->
    <div id="loading-screen" class="absolute inset-0 z-20 hidden p-8 md:p-20 text-green-400">
        <div id="terminal-text" class="text-lg md:text-xl">
            > Initializing repair sequence...<br>
        </div>
        <span class="cursor-blink">> _</span>
    </div>

    

    <script>
        const errorScreen = document.getElementById('error-screen');
        const repairBtn = document.getElementById('repair-btn');
        const loadingScreen = document.getElementById('loading-screen');
        const terminalText = document.getElementById('terminal-text');
        const successScreen = document.getElementById('success-screen');

        const loadingMessages = [
            "> Deleting 'sleepiness.exe'...",
            "> Installing 'virus.dll'...",
            "> Bypassing anger firewall...",
            "> Patching relationship core...",
            "> Repair 100% Complete!",
            "> ຫຼິ້ນເກມປະ !!!"
        ];

        repairBtn.addEventListener('click', () => {
            // ซ่อนจอฟ้า โชว์จอโหลด
            errorScreen.classList.add('hidden');
            loadingScreen.classList.remove('hidden');

            let delay = 0;
            // พิมพ์ข้อความโหลดทีละบรรทัด
            loadingMessages.forEach((msg, index) => {
                delay += 800 + Math.random() * 500; // สุ่มเวลาโหลดให้ดูสมจริง
                setTimeout(() => {
                    terminalText.innerHTML += msg + "<br>";
                    
                    // ถ้าเป็นข้อความสุดท้าย ให้รอแป๊บนึงแล้วโชว์หน้าสำเร็จ
                   
                }, delay);
            });
        });
    </script>
</body>
</html>
